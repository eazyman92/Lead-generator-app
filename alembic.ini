[alembic]
script_location = database/migrations
prepend_sys_path = .
version_path_separator = os
# Runtime database URL is loaded from the DATABASE_URL environment variable
# in database/migrations/env.py. Keep this value empty to avoid ConfigParser
# interpolation and to prevent secrets from being stored in this file.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
